<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mock WebChat</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #202124;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
      }

      header {
        border-bottom: 1px solid #deded6;
        padding: 16px 22px;
      }

      h1 {
        font-size: 18px;
        margin: 0;
      }

      #conversation {
        display: grid;
        align-content: start;
        gap: 14px;
        padding: 22px;
      }

      .message {
        border: 1px solid #deded6;
        border-radius: 8px;
        background: #ffffff;
        max-width: 900px;
        padding: 14px 16px;
        white-space: pre-wrap;
      }

      .user {
        justify-self: end;
        background: #edf6ff;
        border-color: #c9def1;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        border-top: 1px solid #deded6;
        padding: 16px 22px;
        background: #ffffff;
      }

      textarea {
        min-height: 74px;
        resize: vertical;
        border: 1px solid #c8c8bd;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }

      button {
        align-self: end;
        height: 42px;
        border: 0;
        border-radius: 8px;
        background: #146c5f;
        color: #ffffff;
        font: inherit;
        font-weight: 650;
        padding: 0 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Mock WebChat</h1>
      </header>
      <section id="conversation" aria-live="polite"></section>
      <form id="composer">
        <textarea data-webchat-input aria-label="Prompt"></textarea>
        <button data-webchat-submit type="submit">Send</button>
      </form>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
